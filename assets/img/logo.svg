<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Madar logo">
  <defs>
    <linearGradient id="lg-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0c08f"/>
      <stop offset="1" stop-color="#c39f6f"/>
    </linearGradient>
    <linearGradient id="lg-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c9a82"/>
      <stop offset="1" stop-color="#5e7a66"/>
    </linearGradient>
  </defs>
  <!-- left page (sage) -->
  <path d="M60 86 C44 74 30 72 20 73 L20 38 C30 37 47 39 60 50 Z" fill="url(#lg-green)"/>
  <!-- right page (gold) shaped as rising check -->
  <path d="M60 50 C73 39 90 37 100 38 L100 73 C90 72 76 74 60 86 Z" fill="url(#lg-green)" opacity="0.0"/>
  <!-- check / rising path in gold -->
  <path d="M60 86 L48 64 L58 58 L64 70 L92 30 L102 36 Z" fill="url(#lg-gold)"/>
  <!-- right page outline gold -->
  <path d="M60 50 C73 39 90 37 100 38 L100 73 C90 72 78 73.5 66 79" stroke="url(#lg-gold)" stroke-width="3.4" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- spine -->
  <path d="M60 50 L60 86" stroke="#0e1915" stroke-width="2.2" stroke-linecap="round" opacity="0.35"/>
</svg>
